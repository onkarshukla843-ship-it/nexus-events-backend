<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Nexus Events</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/auth.css">
</head>
<body class="dark-theme auth-page">

    <a href="index.html" class="back-link glass-pill">
        <i class="fas fa-arrow-left"></i> Back to Home
    </a>

    <div class="auth-container">
        <div class="neon-orb orb-1"></div>
        <div class="neon-orb orb-2"></div>

        <div class="auth-card glass-card">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Join Nexus and start hosting your events</p>
            </div>
            
            <div id="authError" style="display: none; background: rgba(255, 77, 77, 0.1); border: 1px solid #ff4d4d; color: #ff4d4d; padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center; font-weight: bold;"></div>

            <form id="nexusRegisterForm" class="auth-form" onsubmit="event.preventDefault(); handleRegistration();">
                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="regName" placeholder="John Doe" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="regEmail" placeholder="john@example.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Password (Min 6 characters)</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="regPassword" placeholder="••••••••" required minlength="6">
                    </div>
                </div>

                <button type="submit" class="btn btn-neon btn-full" id="regBtn">
                    <span id="regBtnText">Sign Up</span>
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html" class="neon-link">Log In</a></p>
            </div>
        </div>
    </div>

    <script>
        async function handleRegistration() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            
            const btn = document.getElementById('regBtn');
            const btnText = document.getElementById('regBtnText');
            const errorDiv = document.getElementById('authError');

            errorDiv.style.display = 'none';
            btn.disabled = true;
            btnText.textContent = 'Creating Account...';

            try {
                const response = await fetch('http://localhost:5001/api/v1/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    btnText.textContent = 'Success!';
                    window.location.href = 'dashboard.html'; 
                } else {
                    throw new Error(data.error || data.message || 'Registration failed');
                }
            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btnText.textContent = 'Sign Up';
            }
        }
    </script>
</body>
</html>
