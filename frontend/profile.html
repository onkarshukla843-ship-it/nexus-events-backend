<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Identity | Nexus Events</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/dashboard.css">
    
    <style>
        .profile-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
            margin-top: 30px;
            align-items: start;
        }

        @media (max-width: 900px) {
            .profile-layout { grid-template-columns: 1fr; }
        }

        /* Avatar Card */
        .avatar-card {
            text-align: center;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: sticky;
            top: 20px;
        }

        .avatar-wrapper {
            position: relative;
            width: 180px; height: 180px;
            margin-bottom: 20px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid var(--neon-blue);
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.3);
            transition: all 0.3s ease;
        }

        .avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        
        .avatar-overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(18, 18, 24, 0.85); color: #00f2fe;
            text-align: center; padding: 12px 0; font-size: 0.9rem; font-weight: bold;
            /* 🚨 FIXED: Removed 'display: none' so it slides up smoothly! */
            transform: translateY(100%); transition: all 0.3s ease; 
            border-top: 1px solid rgba(0, 242, 254, 0.3);
        }

        /* Hover effects ONLY active during edit mode */
        .avatar-wrapper.editing { cursor: pointer; }
        .avatar-wrapper.editing:hover { box-shadow: 0 0 40px rgba(0, 242, 254, 0.6); transform: scale(1.02); }
        .avatar-wrapper.editing:hover .avatar-overlay { transform: translateY(0); }
        .avatar-wrapper.editing:hover img { opacity: 0.5; filter: blur(2px); }
        
        #imageUpload { display: none; }

        .profile-role-badge {
            display: inline-block; padding: 6px 18px; border-radius: 20px;
            background: rgba(188, 19, 254, 0.1); color: var(--neon-purple);
            border: 1px solid rgba(188, 19, 254, 0.3); font-size: 0.85rem;
            text-transform: uppercase; letter-spacing: 1px; margin-top: 10px;
        }

        /* Form Sections */
        .profile-form-card { padding: 40px; }
        .form-section-title {
            margin-top: 0; border-bottom: 1px solid rgba(255,255,255,0.05); 
            padding-bottom: 15px; margin-bottom: 25px; color: #fff;
            display: flex; align-items: center; gap: 10px;
        }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }

        .input-with-icon { position: relative; }
        .input-with-icon i {
            position: absolute; left: 15px; top: 50%; transform: translateY(-50%);
            color: #00f2fe; opacity: 0.7;
        }
        .input-with-icon input, .input-with-icon textarea { padding-left: 45px; transition: 0.3s; }
        textarea.glass-input { min-height: 120px; resize: vertical; padding-top: 15px; }
        .input-with-icon textarea + i { top: 25px; }

        /* Locked Field Styles */
        .glass-input:disabled {
            background: rgba(0, 0, 0, 0.2);
            color: #aaa;
            border-color: rgba(255, 255, 255, 0.05);
            cursor: not-allowed;
        }
    </style>
</head>
<body class="dark-theme">

    <div class="dashboard-layout">
        <aside class="sidebar glass-panel">
            <div class="sidebar-header">
                <h2><span class="neon-text">N</span>Events</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html"><i class="fas fa-home"></i> Overview</a></li>
                <li><a href="my-bookings.html"><i class="fas fa-ticket-alt"></i> My Bookings</a></li>
                <li><a href="events.html"><i class="fas fa-calendar-alt"></i> Browse Events</a></li>
                <li><a href="create-event.html"><i class="fas fa-plus-circle"></i> Host Event</a></li>
                <li class="active"><a href="profile.html"><i class="fas fa-user"></i> Profile</a></li>
                <li class="logout"><a href="#" onclick="Utils.logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>

        <main class="dashboard-content">
            <header class="dashboard-header glass-nav">
                <div class="header-title">
                    <h2>Creator <span class="neon-text">Identity</span></h2>
                    <p style="color: #aaa; font-size: 0.9rem;">Manage your public host profile.</p>
                </div>
            </header>

            <div class="container profile-layout">
                
                <div class="glass-card avatar-card" data-aos="fade-right">
                    <div class="avatar-wrapper" id="avatarWrapper">
                        <img id="profilePreview" src="" alt="Profile Image">
                        <div class="avatar-overlay" id="avatarText">
                            <i class="fas fa-camera"></i> Change Photo
                        </div>
                    </div>
                    <input type="file" id="imageUpload" accept="image/png, image/jpeg, image/webp">
                    <input type="hidden" id="uploadedImageUrl">
                    
                    <h3 id="displayCardName" style="margin: 10px 0 0 0; font-size: 1.5rem;">Loading...</h3>
                    <p id="displayCardLocation" style="color: #aaa; font-size: 0.9rem; margin: 5px 0 0 0;"><i class="fas fa-map-marker-alt"></i> Planet Earth</p>
                    <div class="profile-role-badge" id="displayCardRole">Host</div>
                </div>

                <div class="glass-card profile-form-card" data-aos="fade-left">
                    <form id="profileForm">
                        
                        <h3 class="form-section-title"><i class="fas fa-id-card neon-text"></i> Basic Information</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Full Name</label>
                                <div class="input-with-icon">
                                    <i class="fas fa-user"></i>
                                    <input type="text" id="userName" class="glass-input locked-field" required placeholder="e.g. Jane Doe">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Account Email (Always locked)</label>
                                <div class="input-with-icon">
                                    <i class="fas fa-envelope"></i>
                                    <input type="email" id="userEmail" class="glass-input" disabled>
                                </div>
                            </div>
                        </div>

                        <h3 class="form-section-title"><i class="fas fa-address-book" style="color: var(--neon-purple);"></i> Contact & Links</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Phone Number</label>
                                <div class="input-with-icon">
                                    <i class="fas fa-phone"></i>
                                    <input type="tel" id="userPhone" class="glass-input locked-field" placeholder="+1 (555) 000-0000">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>City / Location</label>
                                <div class="input-with-icon">
                                    <i class="fas fa-map-marker-alt"></i>
                                    <input type="text" id="userLocation" class="glass-input locked-field" placeholder="e.g. San Francisco, CA">
                                </div>
                            </div>
                            <div class="form-group" style="grid-column: 1 / -1;">
                                <label>Personal Website or Portfolio</label>
                                <div class="input-with-icon">
                                    <i class="fas fa-link"></i>
                                    <input type="url" id="userWebsite" class="glass-input locked-field" placeholder="https://www.yourwebsite.com">
                                </div>
                            </div>
                        </div>

                        <h3 class="form-section-title"><i class="fas fa-quote-left" style="color: #10b981;"></i> About Me</h3>
                        <div class="form-group">
                            <label>Host Biography</label>
                            <div class="input-with-icon">
                                <i class="fas fa-pen"></i>
                                <textarea id="userBio" class="glass-input locked-field" placeholder="Tell attendees about yourself..."></textarea>
                            </div>
                        </div>

                        <div style="text-align: right; margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 25px;">
                            <button type="button" class="btn btn-primary" id="actionBtn" style="padding: 12px 30px; font-size: 1rem;">
                                <i class="fas fa-edit"></i> Edit Profile
                            </button>
                        </div>
                    </form>
                </div>

            </div>
        </main>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="./js/utils.js"></script>
    <script>
        AOS.init({ once: true, offset: 50 });

        const backendBaseUrl = 'http://127.0.0.1:5001';
        let isEditing = false; 

        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = Utils.getUser();
            const token = localStorage.getItem('token');
            if (!currentUser || !token) return window.location.href = 'login.html';

            // Pre-fill all data
            document.getElementById('userName').value = currentUser.name || '';
            document.getElementById('userEmail').value = currentUser.email || '';
            document.getElementById('userPhone').value = currentUser.phone || '';
            document.getElementById('userLocation').value = currentUser.location || '';
            document.getElementById('userWebsite').value = currentUser.website || '';
            document.getElementById('userBio').value = currentUser.bio || '';

            document.getElementById('displayCardName').textContent = currentUser.name;
            document.getElementById('displayCardRole').textContent = currentUser.role || 'User';
            if(currentUser.location) {
                document.getElementById('displayCardLocation').innerHTML = `<i class="fas fa-map-marker-alt"></i> ${currentUser.location}`;
            }

            if (currentUser.avatar) {
                document.getElementById('profilePreview').src = backendBaseUrl + currentUser.avatar;
                document.getElementById('uploadedImageUrl').value = currentUser.avatar;
            } else {
                document.getElementById('profilePreview').src = `https://ui-avatars.com/api/?name=${currentUser.name}&background=00f2fe&color=fff&size=256`;
            }

            // Lock the form initially
            toggleEditMode(false);

            // Button Logic
            const actionBtn = document.getElementById('actionBtn');
            const profileForm = document.getElementById('profileForm');

            actionBtn.addEventListener('click', async () => {
                if (!isEditing) {
                    toggleEditMode(true);
                } else {
                    profileForm.dispatchEvent(new Event('submit', { cancelable: true, bubbles: true }));
                }
            });

            // Form Submit Logic
            profileForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                if (!isEditing) return;

                const payload = {
                    name: document.getElementById('userName').value,
                    avatar: document.getElementById('uploadedImageUrl').value,
                    phone: document.getElementById('userPhone').value,
                    location: document.getElementById('userLocation').value,
                    website: document.getElementById('userWebsite').value,
                    bio: document.getElementById('userBio').value
                };

                try {
                    actionBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
                    actionBtn.disabled = true;

                    const response = await fetch(`${backendBaseUrl}/api/v1/auth/updatedetails`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(payload)
                    });

                    const data = await response.json();

                    // 🚨 THE BULLETPROOF MEMORY FIX 🚨
                    if (response.ok) {
                        // 1. Grab the existing user from browser memory
                        let existingUser = JSON.parse(localStorage.getItem('user')) || {};
                        
                        // 2. Forcefully update it with EXACTLY what you just typed
                        existingUser.name = payload.name;
                        existingUser.avatar = payload.avatar;
                        existingUser.phone = payload.phone;
                        existingUser.location = payload.location;
                        existingUser.website = payload.website;
                        existingUser.bio = payload.bio;

                        // 3. Save the repaired object back to memory so it survives page reloads
                        localStorage.setItem('user', JSON.stringify(existingUser));

                        alert('Profile saved successfully!');
                        
                        // Update UI and Lock the form again
                        document.getElementById('displayCardName').textContent = payload.name;
                        document.getElementById('displayCardLocation').innerHTML = `<i class="fas fa-map-marker-alt"></i> ${payload.location || 'Planet Earth'}`;
                        toggleEditMode(false);
                    } else {
                        throw new Error(data.message || "Failed to update");
                    }
                } catch (err) {
                    alert('Error: ' + err.message);
                } finally {
                    actionBtn.disabled = false;
                }
            });

            // 🚨 UPDATED UX LOGIC FOR AVATAR
            const avatarWrapper = document.getElementById('avatarWrapper');
            avatarWrapper.addEventListener('click', () => {
                if (isEditing) {
                    document.getElementById('imageUpload').click();
                } else {
                    // Smart UX: Tell them exactly why it's not clicking!
                    alert("Please click the 'Edit Profile' button at the bottom first to unlock your photo and details!");
                }
            });

            document.getElementById('imageUpload').addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const formData = new FormData();
                formData.append('image', file);

                try {
                    document.getElementById('avatarText').innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
                    
                    const response = await fetch(`${backendBaseUrl}/api/v1/upload`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` },
                        body: formData
                    });

                    const data = await response.json();
                    
                    if (data.success) {
                        document.getElementById('profilePreview').src = backendBaseUrl + data.url;
                        document.getElementById('uploadedImageUrl').value = data.url;
                        document.getElementById('avatarText').innerHTML = '<i class="fas fa-camera"></i> Change Photo';
                    } else {
                        throw new Error(data.error);
                    }
                } catch (error) {
                    alert("Image upload failed.");
                    document.getElementById('avatarText').innerHTML = '<i class="fas fa-camera"></i> Change Photo';
                }
            });
        });

        // Helper Function to Lock/Unlock the UI
        function toggleEditMode(state) {
            isEditing = state;
            const fields = document.querySelectorAll('.locked-field');
            const actionBtn = document.getElementById('actionBtn');
            const avatarWrapper = document.getElementById('avatarWrapper');

            fields.forEach(field => field.disabled = !state);

            if (state) {
                actionBtn.innerHTML = '<i class="fas fa-save"></i> Save All Changes';
                actionBtn.classList.add('btn-neon');
                avatarWrapper.classList.add('editing'); // Enables hover effects
            } else {
                actionBtn.innerHTML = '<i class="fas fa-edit"></i> Edit Profile';
                actionBtn.classList.remove('btn-neon');
                avatarWrapper.classList.remove('editing'); // Disables hover effects
            }
        }
    </script>
</body>
</html>
