<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | Nexus Events</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/auth.css">
</head>
<body class="dark-theme auth-page">

    <a href="index.html" class="back-link glass-pill">
        <i class="fas fa-arrow-left"></i> Back to Home
    </a>

    <div class="auth-container">
        <div class="neon-orb orb-1"></div>
        <div class="neon-orb orb-2"></div>

        <div class="auth-card glass-card">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Enter your credentials to access your portal</p>
            </div>
            
            <div id="authError" style="display: none; background: rgba(255, 77, 77, 0.1); border: 1px solid #ff4d4d; color: #ff4d4d; padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center; font-weight: bold;"></div>

            <form id="nexusLoginForm" class="auth-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="john@example.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-neon btn-full" id="loginBtn">
                    <span id="loginBtnText">Log In</span>
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html" class="neon-link">Sign Up</a></p>
            </div>
        </div>
    </div>

    <script src="./js/login.js"></script>
</body>
</html>
