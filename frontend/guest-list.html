<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest List | Nexus Events</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/dashboard.css">
</head>
<body class="dark-theme">

    <div class="dashboard-layout">
        <aside class="sidebar glass-panel">
            <div class="sidebar-header">
                <h2><span class="neon-text">N</span>Events</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html"><i class="fas fa-home"></i> Overview</a></li>
                <li><a href="events.html"><i class="fas fa-calendar-alt"></i> Browse Events</a></li>
                <li><a href="my-bookings.html"><i class="fas fa-ticket-alt"></i> My Bookings</a></li>
                <li class="logout"><a href="#" onclick="Utils.logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>

        <main class="dashboard-content">
            <header class="dashboard-header glass-nav">
                <div class="header-title">
                    <h2>Guest <span class="neon-text">List</span></h2>
                    <p id="event-title-display" style="color: #aaa; font-size: 0.9rem;">Loading event details...</p>
                </div>
                <button onclick="window.history.back()" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</button>
            </header>

            <div class="container" style="padding-top: 2rem;">
                
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 30px;">
                    <div class="glass-card" style="text-align: center; padding: 20px;">
                        <h3 style="color: #aaa; font-size: 0.9rem; text-transform: uppercase;">Total Revenue</h3>
                        <h2 id="stat-revenue" class="neon-text" style="font-size: 2rem; margin-top: 10px;">$0.00</h2>
                    </div>
                    <div class="glass-card" style="text-align: center; padding: 20px;">
                        <h3 style="color: #aaa; font-size: 0.9rem; text-transform: uppercase;">Tickets Sold</h3>
                        <h2 id="stat-sold" class="neon-text" style="font-size: 2rem; margin-top: 10px;">0</h2>
                    </div>
                    <div class="glass-card" style="text-align: center; padding: 20px;">
                        <h3 style="color: #aaa; font-size: 0.9rem; text-transform: uppercase;">Capacity Left</h3>
                        <h2 id="stat-left" style="font-size: 2rem; margin-top: 10px; color: #fff;">0</h2>
                    </div>
                </div>

                <div class="glass-card" style="padding: 0; overflow: hidden; border-radius: 12px;">
                    <table style="width: 100%; border-collapse: collapse; text-align: left;">
                        <thead style="background: rgba(0, 242, 254, 0.1);">
                            <tr>
                                <th style="padding: 15px 20px; color: #fff; font-weight: 600;">Attendee Name</th>
                                <th style="padding: 15px 20px; color: #fff; font-weight: 600;">Email</th>
                                <th style="padding: 15px 20px; color: #fff; font-weight: 600;">Tickets</th>
                                <th style="padding: 15px 20px; color: #fff; font-weight: 600;">Status</th>
                            </tr>
                        </thead>
                        <tbody id="guest-table-body">
                            <tr><td colspan="4" style="text-align: center; padding: 30px; color: #aaa;">Loading guests...</td></tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </main>
    </div>

    <script src="./js/utils.js"></script>
    <script src="./js/api.js"></script>
   <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const eventId = urlParams.get('id');
            const tableBody = document.getElementById('guest-table-body');

            if (!eventId) {
                alert("No event selected!");
                window.location.href = 'dashboard.html';
                return;
            }

            try {
                // 1. Grab VIP Token
                const token = Utils.getToken();
                if (!token) {
                    window.location.href = 'login.html';
                    return;
                }

                // 2. Fetch the specific Event details (For capacity and Currency)
                const eventRes = await fetch(`https://nexus-events-backend.onrender.com/api/v1/events/${eventId}`, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
                });
                
                if (!eventRes.ok) throw new Error("Could not load event data.");
                const eventDataParsed = await eventRes.json();
                const event = eventDataParsed.data || eventDataParsed;
                
                document.getElementById('event-title-display').textContent = `Attendees for: ${event.title}`;
                
                // 3. Fetch the actual Guest List
                const bookingRes = await fetch(`https://nexus-events-backend.onrender.com/api/v1/bookings/event/${eventId}`, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
                });

                if (!bookingRes.ok) throw new Error("Could not load guest list.");
                const bookingDataParsed = await bookingRes.json();
                const bookings = bookingDataParsed.data || [];

                // 4. Calculate Live Stats
                let totalRevenue = 0;
                let ticketsSold = 0;

                bookings.forEach(b => {
                    totalRevenue += (b.totalAmount || 0);
                    ticketsSold += (b.quantity || 0);
                });

                // 🚨 Format the revenue dynamically based on the event's currency!
                const currencyCode = event.currency || 'USD';
                document.getElementById('stat-revenue').textContent = Utils.formatCurrency(totalRevenue, currencyCode);
                document.getElementById('stat-sold').textContent = ticketsSold;
                
                // Prevent negative capacity if you accidentally overbooked in testing
                const capacityLeft = Math.max(0, event.capacity - ticketsSold);
                document.getElementById('stat-left').textContent = capacityLeft;

                // 5. Render the Guest Table
                if (bookings.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="4" style="text-align: center; padding: 30px; color: #aaa;">No tickets sold yet. Keep promoting!</td></tr>`;
                    return;
                }

                tableBody.innerHTML = bookings.map(booking => `
                    <tr style="border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.3s;" onmouseover="this.style.background='rgba(255,255,255,0.02)'" onmouseout="this.style.background='transparent'">
                        <td style="padding: 15px 20px;">
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <div class="avatar-circle" style="width: 32px; height: 32px; font-size: 0.9rem; background: rgba(0, 242, 254, 0.2); color: #00f2fe; border: 1px solid #00f2fe; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold;">
                                    ${booking.user?.name ? booking.user.name.charAt(0).toUpperCase() : '?'}
                                </div>
                                <span style="text-transform: capitalize; font-weight: 500;">${booking.user?.name || 'Unknown User'}</span>
                            </div>
                        </td>
                        <td style="padding: 15px 20px; color: #aaa;">${booking.user?.email || 'N/A'}</td>
                        <td style="padding: 15px 20px; font-weight: bold;">
                            <span style="background: rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 20px;">${booking.quantity}</span>
                        </td>
                        <td style="padding: 15px 20px;">
                            <span style="color: #10b981; font-size: 0.85rem; background: rgba(16, 185, 129, 0.1); padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(16, 185, 129, 0.3);">
                                <i class="fas fa-check-circle"></i> Paid
                            </span>
                        </td>
                    </tr>
                `).join('');

            } catch (err) {
                console.error("Guest List Error:", err);
                tableBody.innerHTML = `<tr><td colspan="4" style="text-align: center; padding: 30px; color: #ef4444;">Failed to load guest list. Check console for details.</td></tr>`;
            }
        });
    </script>
</body>
</html>
